<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Registration Form</h1>

<form>
  <!-- Name section of form -->
  <label for="firstName">First Name:*</label>
  <input type="text" id="firstName" name="firstName"
    value="Enter First Name"
    onfocus="if(this.value==='Enter First Name') this.value='';"
    onblur="if(this.value==='') this.value='Enter First Name';"
    pattern="[A-Za-z]+" title="Please enter letters only" required>

  <label for="lastName">Last Name:*</label>
  <input type="text" id="lastName" name="lastName"
    value="Enter Last Name"
    onfocus="if(this.value==='Enter Last Name') this.value='';"
    onblur="if(this.value==='') this.value='Enter Last Name';"
    pattern="[A-Za-z]+" title="Please enter letters only" required>

  <!-- Address section of form -->
  <label for="address">Address:*</label>
  <input type="text" id="address" name="address"
    pattern="[A-Za-z0-9\s]+"
    title="Please enter an alphanumeric mailing address" required>

  <label for="city">City:*</label>
  <input type="text" id="city" name="city"
    pattern="[A-Za-z\s]+"
    title="Please enter letters only for the city" required>

  <label for="state">State:*</label>
  <select id="state" name="state" required>
    <option value="">--Select a State--</option>
    <option value="AL">Alabama</option>
    <option value="AK">Alaska</option>
    <option value="AZ">Arizona</option>
    <option value="AR">Arkansas</option>
    <option value="CA">California</option>
    <option value="CO">Colorado</option>
    <option value="CT">Conneticut</option>
    <option value="DE">Delaware</option>
    <option value="DC">District of Columbia</option>
    <option value="FL">Florida</option>
    <option value="GA">Georgia</option>
    <option value="HI">Hawaii</option>
    <option value="ID">Idaho</option>
    <option value="IL">Illinois</option>
    <option value="IN">Indiana</option>
    <option value="IA">Iowa</option>
    <option value="KS">Kansas</option>
    <option value="KY">Kentucky</option>
    <option value="LA">Louisiana</option>
    <option value="ME">Maine</option>
    <option value="MD">Maryland</option>
    <option value="MA">Massachusetts</option>
    <option value="MI">Michigan</option>
    <option value="MN">Minnesota</option>
    <option value="MS">Mississippi</option>
    <option value="MO">Missouri</option>
    <option value="MT">Montana</option>
    <option value="NE">Nebraska</option>
    <option value="NV">Nevada</option>
    <option value="NH">New Hampshire</option>
    <option value="NJ">New Jersey</option>
    <option value="NM">New Mexico</option>
    <option value="NY">New York</option>
    <option value="NC">North Carolina</option>
    <option value="ND">North Dakota</option>
    <option value="OH">Ohio</option>
    <option value="OK">Oklahoma</option>
    <option value="OR">Oregon</option>
    <option value="PA">Pennsylvania</option>
    <option value="RI">Rhode Island</option>
    <option value="SC">South Carolina</option>
    <option value="SD">South Dakota</option>
    <option value="TN">Tennessee</option>
    <option value="TX">Texas</option>
    <option value="UT">Utah</option>
    <option value="VT">Vermont</option>
    <option value="VA">Virginia</option>
    <option value="WA">Washington</option>
    <option value="WV">West Virginia</option>
    <option value="WI">Wisconsin</option>
    <option value="WY">Wyoming</option>
  </select>

  <label for="zipCode">Zip Code:*</label>
  <input type="text" id="zipCode" name="zipCode"
    inputmode="numeric"
    pattern="[0-9]{5}"
    maxlength="5"
    title="Please enter a 5-digit numeric zip code" required>

   <!-- Section for Phone Number -->
  <label for="phoneNumber">Phone Number:*</label>
  <div class="phone-group">
    <input type="text" id="phoneArea" name="phoneArea"
      pattern="[0-9]{3}"
      maxlength="3"
      size="3"
      placeholder="###"
      title="Please enter a 3-digit area code" required>
    <span> - </span>

  <input type="text" id="phoneNumber" name="phoneNumber"
    pattern="[0-9]{7}"
    maxlength="7"
    size="7"
    placeholder="#######"
    title="Please enter a 7-digit phone number" required>
  </div>

  <!-- Section for Email Address -->
  <label for="email">E-mail:*</label>
  <input type="email" id="email" name="email"
    pattern="^.{1,64}@[A-Za-z0-9]{1,252}\.[A-Za-z]{2,}$"
    title="You have entered an invalid e-mail address" required>

  <label for="confirmEmail">Confirm E-mail:*</label>
  <input type="email" id="confirmEmail" name="confirmEmail"
    title="Please re-enter your e-mail address" required>

  <!-- Section for Meal Preference -->
  <fieldset>
    <legend>Meal Preference:* <span class="subtext">(select one)</span></legend>

    <input type="radio" id="vegan" name="mealPreference" value="Vegan" required>
    <label for="vegan">Vegan</label><br>

    <input type="radio" id="vegetarian" name="mealPreference" value="Vegetarian">
    <label for="vegetarian">Vegetarian</label><br>

    <input type="radio" id="nonVegetarian" name="mealPreference" value="Non-Vegetarian">
    <label for="nonVegetarian">Non-Vegetarian</label>
  </fieldset>

  <!-- Section for Contact Method -->
  <fieldset id="contactSection">
    <legend>Contact Method:* <span class="subtext">(select more than one)</span></legend>

    <input type="checkbox" id="methodPhone" name="contactMethod" value="Phone">
    <label for="methodPhone">Phone</label>

    <input type="checkbox" id="methodEmail" name="contactMethod" value="E-mail">
    <label for="methodEmail">E-mail</label><br>

    <input type="checkbox" id="methodMail" name="contactMethod" value="Mail">
    <label for="methodMail">Mail</label>

    <input type="checkbox" id="methodLinkedIn" name="contactMethod" value="LinkedIn">
    <label for="methodLinkedIn">LinkedIn</label>

    <div id="contactError" style="color: red; display: none;">Please select at least two contact methods.</div>
  </fieldset>

  <!-- Section for Comment Section -->
  <label for="commentSection">Comments:</label>
  <textarea id="comments" name="comments"
    rows="4"
    maxlength="250"
    placeholder="Enter any additional notes here (max 250 characters)..."></textarea>

  <!-- Section for Comment Section -->
  <form id="registrationForm" action="mailto:your-email@example.com" method="post" enctype="text/plain" onsubmit="return validateForm()">
    <div class="button-group">

  <!-- Buttons -->
      <button type"submit">Submit</button>
      <button type="reset" id="resetBtn" onclick="return handleReset()">Reset</button>
    </div>
      
  </form>
  
  <script src="js/validation.js"js></script>
</body>
</html>
